<!-- SheepShip Main Page -->
<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SheepShip</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="phone">

    <header>

        <div class="title">
            🌙 SheepShip
        </div>

        <div class="top-info">

            <div class="coin">
                🪙
                <span id="coin">1250</span>
            </div>

            <div class="wool">
                🧶
                <span id="wool">328</span>
            </div>

        </div>

    </header>



    <main>

        <div class="night">

            <img
            id="sheep"
            src="assets/sheep/idle.png">

        </div>

        <div class="speech">

            오늘도 좋은 꿈 꾸자!

        </div>



        <div class="menu">

            <button onclick="move('pages/sleep.html')">
                🌙<br>
                수면기록
            </button>

            <button onclick="move('pages/pet.html')">
                🐑<br>
                내 양
            </button>

            <button onclick="move('pages/shear.html')">
                ✂<br>
                양털깎기
            </button>

            <button onclick="move('pages/shop.html')">
                🛒<br>
                상점
            </button>

            <button onclick="move('pages/ai.html')">
                🤖<br>
                AI 상담
            </button>

            <button onclick="move('pages/settings.html')">
                ⚙<br>
                설정
            </button>

        </div>

    </main>

</div>

<script src="js/main.js"></script>

</body>
</html>
