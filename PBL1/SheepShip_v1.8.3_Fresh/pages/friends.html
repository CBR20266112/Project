<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>移쒓뎄 諛?諛⑸Ц | SleepySheep</title>
  
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

  <!-- 諛ㅽ븯??諛곌꼍 -->
  <div class="background">
    <canvas id="star-canvas"></canvas>
    <div class="moon"></div>
  </div>

  <main class="phone">
    <!-- ?ㅻ뜑 -->
    <header class="header">
      <div class="header-left">
        <button class="btn-back" onclick="location.href='../index.html'" title="?ㅻ줈媛湲?>??/button>
        <div>
          <h1>?뫁 移쒓뎄 紐⑸줉</h1>
          <p class="subtitle">?섎㈃ 硫붿씠?몃뱾怨?諛⑹쓣 ?먮갑?댁슂</p>
        </div>
      </div>
      <div class="header-right">
        <div class="chip-box" id="wool-display">
          <span class="icon">?㎍</span>
          <span id="wool-count">0</span>
        </div>
      </div>
    </header>

    <!-- ?ㅽ겕濡??곸뿭 -->
    <div class="content">

      <!-- 移쒓뎄 諛⑸Ц 諛??곸꽭 ?뺣낫 酉?(?④? 泥섎━?섏뿀?ㅺ? 移쒓뎄 ?대┃ ???ㅽ뵂) -->
      <section id="friend-room-visit" class="hidden" style="margin-bottom: var(--space-4);">
        <div class="section-header">
          <span class="section-title">?뙔 移쒓뎄??諛??먮갑 以?/span>
          <span class="section-more" id="btn-close-visit">?뚯븘媛湲???/span>
        </div>
        
        <div id="friend-room-container">
          <!-- friends.js?먯꽌 ?숈쟻?쇰줈 ?앹꽦?댁꽌 二쇱엯 -->
        </div>
      </section>

      <!-- 移쒓뎄 由ъ뒪??移대뱶 -->
      <section class="glass card" style="padding: var(--space-4);" id="friend-list-section">
        <div class="section-header" style="margin-bottom: var(--space-3);">
          <span class="section-title">??移쒓뎄 紐⑸줉</span>
        </div>
        
        <div class="flex flex-col gap-3" id="friends-list-container">
          <!-- js?먯꽌 ?숈쟻?쇰줈 濡쒕뱶 -->
        </div>
      </section>

      <!-- 移쒓뎄 異붽? (?붾? ?? -->
      <section class="glass card" style="padding: var(--space-4);">
        <h3 class="font-bold" style="font-size: var(--font-size-sm); margin-bottom: var(--space-3); color: var(--text-secondary);">??移쒓뎄 異붽??섍린</h3>
        <div class="flex gap-2">
          <input type="text" id="input-friend-code" class="glass" style="flex:1; border-radius: var(--radius-sm); border:1px solid var(--glass-border); padding:var(--space-2) var(--space-3); color:#fff; font-size:var(--font-size-sm);" placeholder="移쒓뎄 ?섎㈃ 肄붾뱶瑜??낅젰?섏꽭??>
          <button class="btn btn-primary" id="btn-add-friend" style="padding:var(--space-2) var(--space-4);">寃??/button>
        </div>
      </section>

    </div>

    <!-- ?섎떒 ?ㅻ퉬寃뚯씠??-->
    <nav class="bottom-nav">
      <div class="nav-item" data-href="../index.html">
        <span class="nav-icon">?룧</span>
        <span class="nav-label">??/span>
        <span class="nav-dot"></span>
      </div>
      <div class="nav-item" data-href="sleep.html">
        <span class="nav-icon">?뱤</span>
        <span class="nav-label">?섎㈃</span>
        <span class="nav-dot"></span>
      </div>
      <div class="nav-item" data-href="sheep.html">
        <span class="nav-icon">?릲</span>
        <span class="nav-label">????/span>
        <span class="nav-dot"></span>
      </div>
      <div class="nav-item" data-href="workshop.html">
        <span class="nav-icon">?㎍</span>
        <span class="nav-label">怨듬갑</span>
        <span class="nav-dot"></span>
      </div>
      <div class="nav-item active" data-href="friends.html">
        <span class="nav-icon">?뫁</span>
        <span class="nav-label">移쒓뎄</span>
        <span class="nav-dot"></span>
      </div>
    </nav>
  </main>

  <script type="module">
    import { initCommon, showToast } from '../js/app.js';
    import { getSheep } from '../js/storage.js';
    import { getFriends, getFriendById, buildFriendCardHTML, buildFriendRoomHTML } from '../js/friends.js';

    document.addEventListener('DOMContentLoaded', () => {
      initCommon();

      const woolCount = document.getElementById('wool-count');
      const friendsListContainer = document.getElementById('friends-list-container');
      const friendRoomVisit = document.getElementById('friend-room-visit');
      const friendRoomContainer = document.getElementById('friend-room-container');
      const btnCloseVisit = document.getElementById('btn-close-visit');
      const inputFriendCode = document.getElementById('input-friend-code');
      const btnAddFriend = document.getElementById('btn-add-friend');

      function refreshUI() {
        const sheep = getSheep();
        woolCount.textContent = sheep.wool;

        // 移쒓뎄 由ъ뒪??濡쒕뱶
        const friends = getFriends();
        
        if (friends.length === 0) {
          friendsListContainer.innerHTML = `
            <div class="empty-state">
              <span class="empty-icon">?뫁</span>
              <p>異붽???移쒓뎄媛 ?놁뒿?덈떎.</p>
            </div>`;
          return;
        }

        friendsListContainer.innerHTML = friends.map(f => buildFriendCardHTML(f)).join('');

        // 移대뱶 ?대┃ 由ъ뒪???곌껐
        document.querySelectorAll('.friend-card').forEach(card => {
          card.addEventListener('click', () => {
            const friendId = card.dataset.friendId;
            visitFriendRoom(friendId);
          });
        });
      }

      function visitFriendRoom(friendId) {
        const friend = getFriendById(friendId);
        if (!friend) return;

        // 移쒓뎄 諛??뚮뜑留?        friendRoomContainer.innerHTML = buildFriendRoomHTML(friend);
        
        // ?좊땲硫붿씠???④낵? ?④퍡 ?쒖떆
        friendRoomVisit.classList.remove('hidden');
        friendRoomVisit.style.animation = 'slideDown 0.35s ease forwards';
        
        // ?먮갑 ?꾩튂濡??ㅽ겕濡??대룞
        document.querySelector('.content').scrollTo({
          top: 0,
          behavior: 'smooth'
        });

        showToast(`${friend.name}?섏쓽 諛⑹뿉 ??ъ솕?듬땲?? ?룪`, 'success');
      }

      // ?먮갑 醫낅즺
      btnCloseVisit.addEventListener('click', () => {
        friendRoomVisit.classList.add('hidden');
      });

      // 移쒓뎄 異붽?
      btnAddFriend.addEventListener('click', () => {
        const code = inputFriendCode.value.trim();
        if (!code) {
          showToast('肄붾뱶瑜??뺥솗???낅젰?섏꽭??', 'error');
          return;
        }
        
        showToast('?꾨줈?좏???踰꾩쟾?먯꽌??移쒓뎄 肄붾뱶媛 ?곕え?⑹쑝濡?怨좎젙?⑸땲?? (異붽? 遺덇?)', 'error');
        inputFriendCode.value = '';
      });

      refreshUI();
    });
  </script>
</body>
</html>
