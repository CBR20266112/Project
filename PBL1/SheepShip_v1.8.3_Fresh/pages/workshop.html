<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>?묓꽭 怨듬갑 | SleepySheep</title>
  
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

  <!-- 諛ㅽ븯??諛곌꼍 -->
  <div class="background">
    <canvas id="star-canvas"></canvas>
    <div class="moon"></div>
  </div>

  <main class="phone">
    <!-- ?ㅻ뜑 -->
    <header class="header">
      <div class="header-left">
        <button class="btn-back" onclick="location.href='../index.html'" title="?ㅻ줈媛湲?>??/button>
        <div>
          <h1>?룵 ?묓꽭 怨듬갑</h1>
          <p class="subtitle">紐⑥? ?묓꽭濡?袁몃?湲??붿냼瑜??띾뱷?댁슂</p>
        </div>
      </div>
      <div class="header-right">
        <div class="chip-box" id="wool-display">
          <span class="icon">?㎍</span>
          <span id="wool-count">0</span>
        </div>
      </div>
    </header>

    <!-- ?ㅽ겕濡??곸뿭 -->
    <div class="content">

      <!-- ??諛??꾨━酉??곸뿭 -->
      <section class="section-header" style="margin-bottom: var(--space-2);">
        <span class="section-title">?룪 ?섏쓽 ?꾨뒔??諛??꾨━酉?/span>
      </section>
      <section id="room-preview-container" style="margin-bottom: var(--space-3);">
        <!-- room.js瑜??듯빐 諛?袁몃?湲??붿냼媛 ?뚮뜑留곷맖 -->
      </section>

      <!-- ?곸젏 ?꾩씠??由ъ뒪???곸뿭 -->
      <section class="glass card" style="padding: var(--space-4);">
        <div class="section-header">
          <h3 class="font-bold" style="font-size: var(--font-size-sm); color: var(--text-secondary);">?썚截??곸젏 移댄뀒怨좊━</h3>
        </div>

        <!-- 移댄뀒怨좊━ ??(媛濡??ㅽ겕濡?媛?ν븯?꾨줉 CSS 泥섎━) -->
        <div class="tab-bar" id="category-tabs" style="overflow-x: auto; white-space: nowrap; gap: 4px; padding: 4px; display: flex; scrollbar-width: none;">
          <!-- js?먯꽌 ?숈쟻?쇰줈 濡쒕뱶 -->
        </div>

        <div class="divider" style="margin: var(--space-3) 0;"></div>

        <!-- ?꾩씠??洹몃━??由ъ뒪??-->
        <div class="grid-3" id="shop-items-grid" style="min-height: 220px;">
          <!-- js?먯꽌 ?숈쟻?쇰줈 濡쒕뱶 -->
        </div>
      </section>

    </div>

    <!-- ?섎떒 ?ㅻ퉬寃뚯씠??-->
    <nav class="bottom-nav">
      <div class="nav-item" data-href="../index.html">
        <span class="nav-icon">?룧</span>
        <span class="nav-label">??/span>
        <span class="nav-dot"></span>
      </div>
      <div class="nav-item" data-href="sleep.html">
        <span class="nav-icon">?뱤</span>
        <span class="nav-label">?섎㈃</span>
        <span class="nav-dot"></span>
      </div>
      <div class="nav-item" data-href="sheep.html">
        <span class="nav-icon">?릲</span>
        <span class="nav-label">????/span>
        <span class="nav-dot"></span>
      </div>
      <div class="nav-item active" data-href="workshop.html">
        <span class="nav-icon">?㎍</span>
        <span class="nav-label">怨듬갑</span>
        <span class="nav-dot"></span>
      </div>
      <div class="nav-item" data-href="friends.html">
        <span class="nav-icon">?뫁</span>
        <span class="nav-label">移쒓뎄</span>
        <span class="nav-dot"></span>
      </div>
    </nav>
  </main>

  <!-- 援щℓ ?섏궗 ?뺤씤??紐⑤떖 -->
  <div class="overlay" id="shop-overlay"></div>
  <div class="modal" id="purchase-modal">
    <div class="modal-handle"></div>
    <h3 class="text-center font-bold" style="font-size: var(--font-size-lg); margin-bottom: var(--space-3);" id="purchase-title">?꾩씠??援щℓ</h3>
    <p class="text-center text-muted" style="font-size: var(--font-size-sm); margin-bottom: var(--space-5);" id="purchase-desc">
      ???꾩씠?쒖쓣 援щℓ?섏떆寃좎뒿?덇퉴?
    </p>
    <div class="flex flex-col gap-3">
      <button class="btn btn-primary" id="btn-purchase-confirm">援щℓ ?꾨즺</button>
      <button class="btn btn-secondary" id="btn-close-purchase-modal">痍⑥냼</button>
    </div>
  </div>

  <script type="module">
    import { initCommon, showToast } from '../js/app.js';
    import { getSheep } from '../js/storage.js';
    import { renderRoom } from '../js/room.js';
    import { 
      getItemsByCategory, 
      findItem, 
      purchaseItem, 
      toggleEquip, 
      buildShopItemHTML, 
      buildCategoryTabsHTML 
    } from '../js/shop.js';
    import { getItems } from '../js/storage.js';

    document.addEventListener('DOMContentLoaded', () => {
      initCommon();

      const woolCount = document.getElementById('wool-count');
      const roomPreviewContainer = document.getElementById('room-preview-container');
      const categoryTabs = document.getElementById('category-tabs');
      const shopItemsGrid = document.getElementById('shop-items-grid');

      const shopOverlay = document.getElementById('shop-overlay');
      const purchaseModal = document.getElementById('purchase-modal');
      const purchaseTitle = document.getElementById('purchase-title');
      const purchaseDesc = document.getElementById('purchase-desc');
      const btnPurchaseConfirm = document.getElementById('btn-purchase-confirm');

      let currentCategory = 'all';
      let pendingPurchaseItemId = null;

      function refreshUI() {
        const sheep = getSheep();
        woolCount.textContent = sheep.wool;

        // 諛??뚮뜑留?        renderRoom(roomPreviewContainer);

        // 移댄뀒怨좊━ ??洹몃━湲?        categoryTabs.innerHTML = buildCategoryTabsHTML(currentCategory);
        
        // 移댄뀒怨좊━ ?대깽???몃뱾???щ컮?몃뵫
        document.querySelectorAll('#category-tabs .tab-item').forEach(btn => {
          btn.addEventListener('click', () => {
            currentCategory = btn.dataset.category;
            refreshUI();
          });
        });

        // ?곸젏 ?꾩씠??洹몃━??洹몃━湲?        const items = getItems();
        const catalogList = getItemsByCategory(currentCategory);
        
        if (catalogList.length === 0) {
          shopItemsGrid.innerHTML = `
            <div class="empty-state w-full" style="grid-column: span 3;">
              <span class="empty-icon">?썚截?/span>
              <p>?대떦 移댄뀒怨좊━???꾩씠?쒖씠 ?놁뼱??</p>
            </div>`;
          return;
        }

        shopItemsGrid.innerHTML = catalogList.map(item => 
          buildShopItemHTML(item, items.owned, items.equipped)
        ).join('');

        // ?꾩씠???대┃ ?대깽??諛붿씤??        document.querySelectorAll('#shop-items-grid .shop-item').forEach(card => {
          card.addEventListener('click', () => {
            const itemId = card.dataset.itemId;
            handleItemClick(itemId);
          });
        });
      }

      function handleItemClick(itemId) {
        const item = findItem(itemId);
        if (!item) return;

        const items = getItems();
        const isOwned = items.owned.includes(itemId) || item.price === 0;

        if (isOwned) {
          // ?대? ?뚯쑀以묒씤 ?꾩씠?쒖씠硫??μ갑 ?좉?
          const res = toggleEquip(itemId);
          if (res.success) {
            showToast(res.msg, 'success');
            refreshUI();
          } else {
            showToast(res.msg, 'error');
          }
        } else {
          // 誘몄냼?좊㈃ 援щℓ ?앹뾽
          const sheep = getSheep();
          if (sheep.wool < item.price) {
            showToast(`?묓꽭??遺議깊빀?덈떎! ?㎍ ${item.price}媛쒓? ?꾩슂?⑸땲??`, 'error');
            return;
          }

          pendingPurchaseItemId = itemId;
          purchaseTitle.innerHTML = `?묓꽭 源롪린 ?꾩씠??援щℓ ?썟`;
          purchaseDesc.innerHTML = `<span style="font-size:1.8rem; display:block; margin-bottom:8px;">${item.icon}</span><strong>${item.name}</strong>??瑜? <strong>?㎍ ${item.price}</strong> ?묓꽭濡?援щℓ?섏떆寃좎뒿?덇퉴?`;
          
          shopOverlay.classList.add('active');
          purchaseModal.classList.add('active');
        }
      }

      // 援щℓ ?뺤젙
      btnPurchaseConfirm.addEventListener('click', () => {
        if (!pendingPurchaseItemId) return;

        const res = purchaseItem(pendingPurchaseItemId);
        if (res.success) {
          showToast(res.msg, 'success');
          // ?μ갑源뚯? ?먮룞 吏꾪뻾
          toggleEquip(pendingPurchaseItemId);
          pendingPurchaseItemId = null;
          
          purchaseModal.classList.remove('active');
          shopOverlay.classList.remove('active');
          refreshUI();
        } else {
          showToast(res.msg, 'error');
        }
      });

      // 痍⑥냼/?앹뾽 ?リ린
      document.getElementById('btn-close-purchase-modal').addEventListener('click', () => {
        purchaseModal.classList.remove('active');
        shopOverlay.classList.remove('active');
        pendingPurchaseItemId = null;
      });

      shopOverlay.addEventListener('click', () => {
        purchaseModal.classList.remove('active');
        shopOverlay.classList.remove('active');
        pendingPurchaseItemId = null;
      });

      refreshUI();
    });
  </script>
</body>
</html>
