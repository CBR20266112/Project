<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="page.title">Attendance | SleepySheep</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
  <div class="background">
    <canvas id="star-canvas"></canvas>
    <div class="moon"></div>
  </div>

  <main class="phone">
    <header class="header">
      <div class="header-left">
        <button class="btn-back" onclick="location.href='../index.html'" title="뒤로가기" data-i18n-title="common.back">‹</button>
        <div>
          <h1 data-i18n="page.heading">📅 Attendance</h1>
          <p class="subtitle" data-i18n="page.subtitle">Check in daily and collect stories</p>
        </div>
      </div>
      <div class="header-right">
        <div class="chip-box" id="wool-display">
          <span class="icon">🧶</span>
          <span id="wool-count">0</span>
        </div>
      </div>
    </header>

    <div class="content">
      <section class="glass card" style="padding: var(--space-4);">
        <div class="streak-banner">
          <span class="streak-number" id="att-streak">0</span>
          <div class="streak-text">
            <div class="font-bold" style="color:#fff;" data-i18n="attendance.streak.current">days in a row</div>
            <div id="att-next-milestone" data-i18n="attendance.milestone.loading">Calculating next story…</div>
          </div>
        </div>
        <div style="margin-top: var(--space-3);">
          <div class="flex justify-between" style="font-size: var(--font-size-xs); color: var(--text-muted); margin-bottom: 6px;">
            <span data-i18n="attendance.weeklyTitle">This cycle</span>
            <span id="att-week-label">0 / 7</span>
          </div>
          <div class="flex gap-2" id="att-week-dots" style="justify-content:center;"></div>
        </div>
      </section>

      <section class="glass card" style="padding: var(--space-4); text-align:center;">
        <p class="text-muted" style="font-size: var(--font-size-sm); margin-bottom: var(--space-3); line-height: 1.6;" data-i18n-html="attendance.description">
          Check in daily to earn wool, illustrations, and 4-panel comics.<br>
          A 7-, 14-, and 21-day streak unlocks stories.
        </p>
        <button class="btn btn-primary w-full" id="btn-check-in" data-i18n="attendance.checkIn">Check in today</button>
        <p id="att-status-msg" class="text-muted" style="font-size: var(--font-size-xs); margin-top: var(--space-2);"></p>
      </section>

      <section class="glass card" style="padding: var(--space-4);">
        <h3 class="font-bold" style="font-size: var(--font-size-sm); margin-bottom: var(--space-3); color: var(--text-secondary);" data-i18n="attendance.storySectionTitle">📖 Attendance stories</h3>
        <div id="story-list" class="flex flex-col gap-2"></div>
      </section>

      <section style="margin-top: var(--space-2);">
        <a href="gallery.html" class="btn btn-secondary btn-block-link" data-i18n="attendance.galleryLink">View in gallery</a>
      </section>
    </div>

    <nav class="bottom-nav">
      <div class="nav-item" data-href="../index.html">
        <span class="nav-icon">🏠</span>
        <span class="nav-label" data-i18n="nav.home">홈</span>
        <span class="nav-dot"></span>
      </div>
      <div class="nav-item" data-href="sleep.html">
        <span class="nav-icon">🌙</span>
        <span class="nav-label" data-i18n="nav.sleep">수면</span>
        <span class="nav-dot"></span>
      </div>
      <div class="nav-item" data-href="workshop.html">
        <span class="nav-icon">🧶</span>
        <span class="nav-label" data-i18n="nav.workshop">공방</span>
        <span class="nav-dot"></span>
      </div>
      <div class="nav-item" data-href="friends.html">
        <span class="nav-icon">👥</span>
        <span class="nav-label" data-i18n="nav.friends">친구</span>
        <span class="nav-dot"></span>
      </div>
      <div class="nav-item" data-href="gallery.html">
        <span class="nav-icon">🖼️</span>
        <span class="nav-label" data-i18n="nav.gallery">갤러리</span>
        <span class="nav-dot"></span>
      </div>
    </nav>
  </main>

  <script type="module">
    import { initCommon, showToast } from '../js/app.js';
    import { getSheep } from '../js/storage.js';
    import { ATTENDANCE_STORIES } from '../js/constants.js';
    import {
      getAttendance, recordAttendance, isCheckedInToday,
      getNextMilestone, getWeekCycleProgress,
      getStoryImages, isStoryUnlocked,
      getAttendanceRewardMessages,
    } from '../js/attendance.js';
    import { startImageSlideshow } from '../js/opening.js';
    import { t } from '../js/i18n.js';

    document.addEventListener('DOMContentLoaded', () => {
      initCommon();

      const woolCount = document.getElementById('wool-count');
      const attStreak = document.getElementById('att-streak');
      const attNext = document.getElementById('att-next-milestone');
      const attWeekLabel = document.getElementById('att-week-label');
      const attWeekDots = document.getElementById('att-week-dots');
      const btnCheckIn = document.getElementById('btn-check-in');
      const attStatusMsg = document.getElementById('att-status-msg');
      const storyList = document.getElementById('story-list');
      const phone = document.querySelector('.phone');

      function showUnlocks(res) {
        if (!phone || !res || res.alreadyChecked) return;
        const queue = [];
        if (res.newSingle) {
          queue.push({ images: [res.newSingle.path], hintText: t('attendance.unlockHint.single', { title: res.newSingle.title }) });
        }
        if (res.newStrip) {
          queue.push({ images: [res.newStrip.path], hintText: t('attendance.unlockHint.single', { title: res.newStrip.title }) });
        }
        (res.newlyUnlocked || []).forEach(story => {
          queue.push({ images: getStoryImages(story), hintText: t('attendance.unlockHint.story', { title: t(story.titleKey) || story.title }) });
        });

        const showNext = () => {
          const item = queue.shift();
          if (!item) return;
          startImageSlideshow(phone, item.images, {
            skipText: '×',
            hintText: item.hintText,
            onComplete: showNext,
          });
        };
        setTimeout(showNext, 450);
      }

      function renderUI() {
        const sheep = getSheep();
        woolCount.textContent = sheep.wool;

        const att = getAttendance();
        attStreak.textContent = att.streak;

        const next = getNextMilestone(att.streak);
        attNext.textContent = next
          ? t('attendance.nextMilestone', { title: t(next.titleKey) || next.title, daysLeft: next.days - att.streak })
          : t('attendance.allUnlocked');

        const weekProg = getWeekCycleProgress(att.streak);
        attWeekLabel.textContent = `${weekProg} / 7`;
        attWeekDots.innerHTML = '';
        for (let i = 1; i <= 7; i++) {
          const dot = document.createElement('span');
          dot.textContent = i <= weekProg ? '●' : '○';
          dot.style.cssText = `font-size:1.1rem;color:${i <= weekProg ? 'var(--color-purple-soft)' : 'rgba(255,255,255,0.25)'};`;
          attWeekDots.appendChild(dot);
        }

        const checked = isCheckedInToday();
        btnCheckIn.disabled = checked;
        btnCheckIn.textContent = checked ? t('attendance.checkInComplete') : t('attendance.checkIn');
        attStatusMsg.textContent = checked
          ? t('attendance.status.checked', { total: att.total })
          : t('attendance.status.unchecked');

        storyList.innerHTML = '';
        ATTENDANCE_STORIES.forEach(story => {
          const unlocked = isStoryUnlocked(story.id);
          const storyTitle = t(story.titleKey) || story.title;
          const card = document.createElement('div');
          card.className = 'glass';
          card.style.cssText = 'display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3);border-radius:var(--radius-md);opacity:' + (unlocked ? '1' : '0.55') + ';';
          card.innerHTML = `
            <div style="font-size:1.8rem;">${unlocked ? '📖' : '🔒'}</div>
            <div style="flex:1;">
              <div class="font-bold" style="font-size:var(--font-size-sm);">${storyTitle}</div>
              <div class="text-muted" style="font-size:var(--font-size-2xs);">${t('attendance.storyStreak', { days: story.days })}</div>
            </div>
          `;
          if (unlocked) {
            const btn = document.createElement('button');
            btn.className = 'btn btn-secondary';
            btn.style.cssText = 'font-size:var(--font-size-2xs);padding:var(--space-1) var(--space-2);';
            btn.textContent = t('attendance.storyView');
            btn.onclick = () => {
              startImageSlideshow(phone, getStoryImages(story), {
                skipText: '×',
                hintText: t('attendance.storyTapHint', { title: storyTitle }),
              });
            };
            card.appendChild(btn);
          }
          storyList.appendChild(card);
        });
      }

      btnCheckIn.addEventListener('click', () => {
        const res = recordAttendance();
        if (res.alreadyChecked) {
          showToast(t('attendance.toast.alreadyChecked'), 'info');
          return;
        }
        getAttendanceRewardMessages(res).forEach((msg, i) => {
          setTimeout(() => showToast(msg, 'success'), i * 350);
        });
        renderUI();
        showUnlocks(res);
      });

      renderUI();
    });
  </script>
</body>
</html>
