<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>출석체크 | SleepySheep</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

  <div class="background">
    <canvas id="star-canvas"></canvas>
    <div class="moon"></div>
  </div>

  <main class="phone">
    <header class="header">
      <div class="header-left">
        <button class="btn-back" onclick="location.href='../index.html'" title="뒤로가기">←</button>
        <div>
          <h1>📅 출석체크</h1>
          <p class="subtitle">매일 출석하고 스토리를 모아요</p>
        </div>
      </div>
      <div class="header-right">
        <div class="chip-box" id="wool-display">
          <span class="icon">🧶</span>
          <span id="wool-count">0</span>
        </div>
      </div>
    </header>

    <div class="content">
      <section class="glass card" style="padding: var(--space-4);">
        <div class="streak-banner">
          <span class="streak-number" id="att-streak">0</span>
          <div class="streak-text">
            <div class="font-bold" style="color: #fff;">일 연속 출석 중!</div>
            <div id="att-next-milestone">다음 스토리까지 —</div>
          </div>
        </div>
        <div style="margin-top: var(--space-3);">
          <div class="flex justify-between" style="font-size: var(--font-size-xs); color: var(--text-muted); margin-bottom: 6px;">
            <span>이번 주 출석</span>
            <span id="att-week-label">0 / 7</span>
          </div>
          <div class="flex gap-2" id="att-week-dots" style="justify-content: center;"></div>
        </div>
      </section>

      <section class="glass card" style="padding: var(--space-4); text-align: center;">
        <p class="text-muted" style="font-size: var(--font-size-sm); margin-bottom: var(--space-3); line-height: 1.6;">
          매일 출석하면 <strong style="color: var(--color-purple-soft);">양털 +3</strong>을 받아요.<br>
          7·14·21일 연속 출석 시 스토리가 해금됩니다.
        </p>
        <button class="btn btn-primary w-full" id="btn-check-in">✨ 오늘 출석하기</button>
        <p id="att-status-msg" class="text-muted" style="font-size: var(--font-size-xs); margin-top: var(--space-2);"></p>
      </section>

      <section class="glass card" style="padding: var(--space-4);">
        <h3 class="font-bold" style="font-size: var(--font-size-sm); margin-bottom: var(--space-3); color: var(--text-secondary);">📖 출석 스토리</h3>
        <div id="story-list" class="flex flex-col gap-2"></div>
      </section>

      <section style="margin-top: var(--space-2);">
        <a href="gallery.html" class="btn btn-secondary w-full" style="display:block; text-align:center; text-decoration:none;">
          🖼️ 갤러리에서 모아보기
        </a>
      </section>
    </div>

    <nav class="bottom-nav">
      <div class="nav-item" data-href="../index.html">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">홈</span>
        <span class="nav-dot"></span>
      </div>
      <div class="nav-item" data-href="sleep.html">
        <span class="nav-icon">📊</span>
        <span class="nav-label">수면</span>
        <span class="nav-dot"></span>
      </div>
      <div class="nav-item" data-href="sheep.html">
        <span class="nav-icon">🐑</span>
        <span class="nav-label">내 양</span>
        <span class="nav-dot"></span>
      </div>
      <div class="nav-item" data-href="workshop.html">
        <span class="nav-icon">🧶</span>
        <span class="nav-label">공방</span>
        <span class="nav-dot"></span>
      </div>
      <div class="nav-item" data-href="friends.html">
        <span class="nav-icon">👥</span>
        <span class="nav-label">친구</span>
        <span class="nav-dot"></span>
      </div>
    </nav>
  </main>

  <script type="module">
    import { initCommon, showToast } from '../js/app.js';
    import { getSheep } from '../js/storage.js';
    import { ATTENDANCE_STORIES } from '../js/constants.js';
    import {
      getAttendance, recordAttendance, isCheckedInToday,
      getNextMilestone, getWeekCycleProgress,
      getStoryImages, isStoryUnlocked,
    } from '../js/attendance.js';
    import { startImageSlideshow } from '../js/opening.js';

    document.addEventListener('DOMContentLoaded', () => {
      initCommon();

      const woolCount = document.getElementById('wool-count');
      const attStreak = document.getElementById('att-streak');
      const attNext = document.getElementById('att-next-milestone');
      const attWeekLabel = document.getElementById('att-week-label');
      const attWeekDots = document.getElementById('att-week-dots');
      const btnCheckIn = document.getElementById('btn-check-in');
      const attStatusMsg = document.getElementById('att-status-msg');
      const storyList = document.getElementById('story-list');
      const phone = document.querySelector('.phone');

      function renderUI() {
        const sheep = getSheep();
        woolCount.textContent = sheep.wool;

        const att = getAttendance();
        attStreak.textContent = att.streak;

        const next = getNextMilestone(att.streak);
        attNext.textContent = next
          ? `다음 스토리 「${next.title}」까지 ${next.days - att.streak}일`
          : '모든 출석 스토리를 해금했어요! 🎉';

        const weekProg = getWeekCycleProgress(att.streak);
        attWeekLabel.textContent = `${weekProg} / 7`;
        attWeekDots.innerHTML = '';
        for (let i = 1; i <= 7; i++) {
          const dot = document.createElement('span');
          dot.textContent = i <= weekProg ? '●' : '○';
          dot.style.cssText = `font-size:1.1rem;color:${i <= weekProg ? 'var(--color-purple-soft)' : 'rgba(255,255,255,0.25)'};`;
          attWeekDots.appendChild(dot);
        }

        const checked = isCheckedInToday();
        btnCheckIn.disabled = checked;
        btnCheckIn.textContent = checked ? '✅ 오늘 출석 완료' : '✨ 오늘 출석하기';
        attStatusMsg.textContent = checked
          ? `누적 출석 ${att.total}일 · 모닝콜로도 출석이 인정됩니다.`
          : '모닝콜 없이도 여기서 직접 출석할 수 있어요.';

        storyList.innerHTML = '';
        ATTENDANCE_STORIES.forEach(story => {
          const unlocked = isStoryUnlocked(story.id);
          const card = document.createElement('div');
          card.className = 'glass';
          card.style.cssText = 'display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3);border-radius:var(--radius-md);opacity:' + (unlocked ? '1' : '0.55') + ';';
          card.innerHTML = `
            <div style="font-size:1.8rem;">${unlocked ? '📖' : '🔒'}</div>
            <div style="flex:1;">
              <div class="font-bold" style="font-size:var(--font-size-sm);">${story.title}</div>
              <div class="text-muted" style="font-size:var(--font-size-2xs);">연속 ${story.days}일 출석</div>
            </div>
          `;
          if (unlocked) {
            const btn = document.createElement('button');
            btn.className = 'btn btn-secondary';
            btn.style.cssText = 'font-size:var(--font-size-2xs);padding:var(--space-1) var(--space-2);';
            btn.textContent = '보기';
            btn.onclick = () => {
              startImageSlideshow(phone, getStoryImages(story), {
                hintText: `${story.title} — 터치하여 넘기기`,
              });
            };
            card.appendChild(btn);
          }
          storyList.appendChild(card);
        });
      }

      btnCheckIn.addEventListener('click', () => {
        const res = recordAttendance();
        if (res.alreadyChecked) {
          showToast('오늘은 이미 출석했어요!', 'info');
          return;
        }
        showToast(`출석 완료! 양털 +${res.woolGained} 🧶`, 'success');
        if (res.newlyUnlocked.length) {
          setTimeout(() => showToast(`🎉 「${res.newlyUnlocked[0].title}」 해금!`, 'success'), 500);
        }
        renderUI();
      });

      renderUI();
    });
  </script>
</body>
</html>
