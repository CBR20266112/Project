<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sleepy Sheep</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/shearing.css">
</head>

<body>

    <div class="container">

        <header>

            <h1>🐑 Sleepy Sheep</h1>

            <div class="status">

                <div class="card">
                    <span>경험치</span>
                    <h2 id="xpText">0</h2>
                </div>

                <div class="card">
                    <span>성장 단계</span>
                    <h2 id="growthText">STEP 1</h2>
                </div>

                <div class="card">
                    <span>양털</span>
                    <h2 id="woolText">0g</h2>
                </div>

            </div>

        </header>

        <main>

            <div id="sheepArea">

                <img
                    id="growthImage"
                    src="assets/sheep/growth/growth_step_01_raw.png">

            </div>

            <button
                id="shearingBtn"
                disabled>

                ✂ 양털 깎기

            </button>

        </main>

    </div>

    <div id="shearingGame" class="hidden">

        <canvas id="gameCanvas"></canvas>

    </div>

    <script src="js/storage.js"></script>
    <script src="js/growth.js"></script>
    <script src="js/shearing.js"></script>
    <script src="js/game.js"></script>

</body>

</html>
