<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>내 양 | SheepShip</title>

    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/responsive.css">

</head>

<body>

<div class="background">

    <div class="stars"></div>

    <div class="moon"></div>

</div>

<main class="phone">

    <header class="header">

        <div>

            <h1>🐑 내 양</h1>

            <p>오늘도 함께 시간을 보내요.</p>

        </div>

        <div class="point-box">

            🧶 1250

        </div>

    </header>

    <section class="hero-card glass">

        <div class="sheep-box">

            <img

                src="../assets/sheep/idle.png"

                alt="Sheep"

            >

        </div>

        <h2>

            음매

        </h2>

        <p>

            Lv.1

        </p>

    </section>

    <section class="status-card glass">

        <div class="status-item">

            <label>❤️ 행복도</label>

            <div class="progress">

                <div

                    class="fill"

                    style="width:82%"

                ></div>

            </div>

        </div>

        <div class="status-item">

            <label>🍖 배고픔</label>

            <div class="progress">

                <div

                    class="fill"

                    style="width:61%"

                ></div>

            </div>

        </div>

        <div class="status-item">

            <label>🧶 양털</label>

            <div class="progress">

                <div

                    class="fill"

                    style="width:40%"

                ></div>

            </div>

        </div>

    </section>

    <section class="sleep-card glass">

        <h3>🖐️ 상호작용</h3>

        <button class="action-button">

            쓰다듬기

        </button>

        <button class="action-button">

            먹이 주기

        </button>

        <button class="action-button">

            꾸미기

        </button>

    </section>

    <section class="sleep-card glass">

        <h3>💬 오늘의 한마디</h3>

        <p>

            "메에~ 오늘도 와줘서 고마워."

        </p>

    </section>

    <nav class="bottom-nav">

        <button onclick="location.href='../index.html'">

            🏠

        </button>

        <button>

            🐑

        </button>

        <button onclick="location.href='asmr.html'">

            🎵

        </button>

        <button>

            🧶

        </button>

        <button onclick="location.href='settings.html'">

            ⚙️

        </button>

    </nav>

</main>

</body>

</html>
